name: Run Communications Analyst Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Plain-English monitoring request (e.g. 'Track sentiment around GitHub Copilot last 72 hours'). When supplied, chat mode is used and config_path is ignored."
        required: false
        default: ""
      config_path:
        description: "Path to config JSON (used only when prompt is empty)"
        required: false
        default: "config/monitoring_target.sample.json"
      output_dir:
        description: "Output directory"
        required: false
        default: "outputs"
  schedule:
    - cron: "0 */12 * * *"

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run via chat prompt (if prompt supplied)
        if: ${{ github.event.inputs.prompt != '' }}
        env:
          COMMS_X_BEARER_TOKEN: ${{ secrets.COMMS_X_BEARER_TOKEN }}
          COMMS_X_API_BASE: ${{ secrets.COMMS_X_API_BASE }}
          COMMS_LINKEDIN_ACCESS_TOKEN: ${{ secrets.COMMS_LINKEDIN_ACCESS_TOKEN }}
          COMMS_LINKEDIN_API_BASE: ${{ secrets.COMMS_LINKEDIN_API_BASE }}
          COMMS_THREADS_ACCESS_TOKEN: ${{ secrets.COMMS_THREADS_ACCESS_TOKEN }}
          COMMS_THREADS_API_BASE: ${{ secrets.COMMS_THREADS_API_BASE }}
          COMMS_THREADS_API_VERSION: ${{ secrets.COMMS_THREADS_API_VERSION }}
        run: |
          comms-analyst-chat \
            --prompt "${{ github.event.inputs.prompt }}" \
            --output-dir "${{ github.event.inputs.output_dir || 'outputs' }}" \
            --yes

      - name: Run via config file (if no prompt supplied)
        if: ${{ github.event.inputs.prompt == '' }}
        env:
          COMMS_X_BEARER_TOKEN: ${{ secrets.COMMS_X_BEARER_TOKEN }}
          COMMS_X_API_BASE: ${{ secrets.COMMS_X_API_BASE }}
          COMMS_LINKEDIN_ACCESS_TOKEN: ${{ secrets.COMMS_LINKEDIN_ACCESS_TOKEN }}
          COMMS_LINKEDIN_API_BASE: ${{ secrets.COMMS_LINKEDIN_API_BASE }}
          COMMS_THREADS_ACCESS_TOKEN: ${{ secrets.COMMS_THREADS_ACCESS_TOKEN }}
          COMMS_THREADS_API_BASE: ${{ secrets.COMMS_THREADS_API_BASE }}
          COMMS_THREADS_API_VERSION: ${{ secrets.COMMS_THREADS_API_VERSION }}
        run: |
          comms-analyst-agent \
            --config "${{ github.event.inputs.config_path || 'config/monitoring_target.sample.json' }}" \
            --output-dir "${{ github.event.inputs.output_dir || 'outputs' }}"

      - name: Upload generated report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comms-analyst-report-${{ github.run_id }}
          path: outputs/
          if-no-files-found: warn
