name: Submit a new request to Comms Analyst Agent
description: Submit a monitoring request in plain English and get results in this issue thread.
title: "[Report Request] "
labels:
  - report-request
submit-button: Submit
body:
  - type: markdown
    attributes:
      value: |
        > **Comms Analyst Agent Request Form**
        > GitHub may still display the page header as **Create new issue**. This form is the correct submission flow for Comms Analyst Agent.

        ### Submit a new request to Comms Analyst Agent
        Once your report is ready:
        1. Open this issue's comments.
        2. Click the workflow run link posted by the bot.
        3. Download `report.md` and `report.json` from the run artifacts.

        Submit a prompt and the agent will run in GitHub Actions.
        Add the `run-report` label later if you want to re-run this request.

  - type: textarea
    id: prompt
    attributes:
      label: Monitoring prompt
      description: Describe what the agent should monitor.
      placeholder: "Track sentiment around GitHub Copilot over the last 72 hours, competitors: OpenAI, GitLab"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: Optional signal for triage.
      options:
        - Standard
        - High
        - Critical
      default: 0
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Optional links, constraints, or success criteria.
      placeholder: Include any context the analyst should consider.
    validations:
      required: false
